  <style>
    :root {
      --primary: #f59e0b;
      --primary-hover: #d97706;
      --bg-dark: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-dark);
      /* Subtle gradient background */
      background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
      color: var(--text-main);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Container Animation */
    .container {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      width: 100%;
      max-width: 420px;
    }

    .icon-wrapper {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem auto;
      box-shadow: 0 0 40px -10px rgba(245, 158, 11, 0.5);
      position: relative;
    }

    /* Pulse Animation Ring */
    .icon-wrapper::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid var(--primary);
      opacity: 0;
      animation: pulse 2s infinite;
    }

    .icon-wrapper svg {
      width: 44px;
      height: 44px;
      stroke: #0f172a;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 0.75rem;
      background: linear-gradient(to right, #fff, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .retry-btn {
      background: var(--primary);
      color: #0f172a;
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 2.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.2);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .retry-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.4);
    }
    
    .retry-btn:active {
      transform: translateY(0);
    }

    .saved-pages {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      width: 100%;
      text-align: left;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .saved-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .saved-header h3 {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .page-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--text-main);
      text-decoration: none;
      padding: 0.75rem 0.5rem;
      border-radius: 8px;
      transition: all 0.2s ease;
      margin-bottom: 0.25rem;
    }

    .page-link:last-child {
      margin-bottom: 0;
    }

    .page-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--primary);
      transform: translateX(4px);
    }

    .page-link svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-muted);
      transition: stroke 0.2s;
    }

    .page-link:hover svg {
      stroke: var(--primary);
    }

    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #475569;
      font-weight: 500;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.6;
      }
      100% {
        transform: scale(1.4);
        opacity: 0;
      }
    }
  </style>
</head>

<!-- تسجيل Service Worker + تحديث تلقائي -->
<script>
  (function() {
    if (!('serviceWorker' in navigator)) return;

    let refreshing = false;

    // عندما يتحكم Service Worker جديد
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });

    navigator.serviceWorker.register('service-worker.js').then(function(reg) {
      console.log('✅ Service Worker مسجل');

      reg.addEventListener('updatefound', function() {
        const newWorker = reg.installing;

        newWorker.addEventListener('statechange', function() {
          // لو فيه SW قديم شغال → فيه تحديث جديد
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('🔄 تحديث جديد متاح!');
            
            // أرسل رسالة للتحديث فوراً
            newWorker.postMessage('skipWaiting');
          }
        });
      });
    }).catch(function(err) {
      console.log('❌ فشل التسجيل:', err);
    });
  })();
</script>
