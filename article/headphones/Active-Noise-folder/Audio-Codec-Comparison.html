<!-- تسجيل Service Worker + تحديث تلقائي -->
<script>
  (function() {
    if (!('serviceWorker' in navigator)) return;

    let refreshing = false;

    // عندما يتحكم Service Worker جديد
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });

    navigator.serviceWorker.register('service-worker.js').then(function(reg) {
      console.log('✅ Service Worker مسجل');

      reg.addEventListener('updatefound', function() {
        const newWorker = reg.installing;

        newWorker.addEventListener('statechange', function() {
          // لو فيه SW قديم شغال → فيه تحديث جديد
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            console.log('🔄 تحديث جديد متاح!');
            
            // أرسل رسالة للتحديث فوراً
            newWorker.postMessage('skipWaiting');
          }
        });
      });
    }).catch(function(err) {
      console.log('❌ فشل التسجيل:', err);
    });
  })();
</script>
